site:
  team_name: "SweetCraft"
  project_name: "Brazzein"
  year: 2025
  tagline: "A heat-stable sweet protein, brewed by design."

home:
  hero_title_pre: "Make sugar"
  hero_title_em: "history."
  hero_lead: >
    We are engineering microbes to brew brazzein — a tiny, heat-stable
    protein from a West African berry that tastes intensely sweet, yet
    carries no calories and no metabolic cost.
  sweetness_value: "≈2000"
  sweetness_unit: "× sugar"
  sweetness_caption: >
    A pinch does the work of a spoonful. Brazzein stays sweet even after
    baking and boiling, where most sweet proteins fall apart.

project:
  heading: "Sweetness without the sugar tax on health"
  lead: >
    The world eats far more added sugar than is good for it. Brazzein offers
    a different kind of sweet — but nature makes too little of it. So we make our own.
  problem:
    title: "The problem"
    intro: "Excess added sugar drives obesity, type-2 diabetes and dental disease. Yet the alternatives aren't clean wins:"
    points:
      - "Many artificial sweeteners carry a bitter aftertaste and lingering safety debates."
      - "Natural sweet proteins exist, but most denature when heated — useless for cooking or baking."
      - "Brazzein is heat-stable and natural, but the wild berry (Pentadiplandra brazzeana) can't be farmed at scale."
  solution:
    title: "Our solution"
    intro: "Move brazzein out of the rainforest and into a fermenter. We express the protein in microbial hosts and tune it for yield, sweetness and stability."
    points:
      - "Recombinant production in a food-relevant yeast chassis, with E. coli for rapid screening."
      - "Codon- and signal-optimised constructs for efficient secretion."
      - "A characterisation pipeline linking sequence changes to perceived sweetness and thermal stability."

design:
  heading: "How we build a sweeter protein"
  lead: "Four design pillars carry the project from gene to tasting glass. Each is a place where biology meets food science."
  pillars:
    - title: "Chassis selection"
      text: "Comparing a secreting yeast against an E. coli screening strain to balance yield, folding of the three disulphide bonds, and food-safety."
    - title: "Expression & secretion"
      text: "Signal peptides and promoters chosen so the cell exports folded brazzein into the medium, simplifying purification."
    - title: "Sequence engineering"
      text: "Targeted mutations at known sweetness-determining residues to probe — and ideally raise — perceived sweetness."
    - title: "Characterisation"
      text: "SDS-PAGE, thermal melts and a structured sensory panel tie every construct back to a measurable sweetness and stability profile."

engineering:
  heading: "Design — Build — Test — Learn"
  lead: "iGEM's engineering cycle is the spine of our wet lab. One representative turn of the wheel:"
  dbtl:
    - {letter: "D", title: "Design",  text: "Pick a secretion signal and codon-optimise the brazzein gene for our chassis."}
    - {letter: "B", title: "Build",   text: "Assemble the construct as a BioBrick-compatible part and transform the host."}
    - {letter: "T", title: "Test",    text: "Express, purify and measure yield, band size and thermal stability."}
    - {letter: "L", title: "Learn",   text: "Low secretion → revisit the signal peptide, feeding the next design."}

results:
  heading: "What we found"
  lead: "Representative figures from our characterisation runs. Final numbers land as the wet lab wraps up."
  stats:
    - {value: "6.5 kDa", label: "Recombinant brazzein confirmed on SDS-PAGE"}
    - {value: "80 °C",   label: "Sweetness retained after heat challenge"}
    - {value: "12",      label: "Characterised constructs in the registry"}
  note: "Placeholder data — swap in real figures and plots before submission."

human_practices:
  heading: "Who is this sweetener really for?"
  paragraphs:
    - "We spoke with food scientists, dietitians and people living with diabetes to understand whether a protein sweetener would actually fit real kitchens and real diets — not just a lab bench."
    - "Their input reshaped our goals: heat-stability moved to the top of the list, and regulatory and labelling questions became part of the design conversation rather than an afterthought."

safety:
  heading: "Built to be safe by design"
  paragraphs:
    - "We work only with non-pathogenic, well-characterised lab chassis under standard institutional biosafety oversight. No part of the project involves toxins, pathogens or environmental release."
    - "Because brazzein is intended as a food-relevant protein, we consider allergenicity and food-safety frameworks early, and document handling and disposal in line with iGEM's safety rules."

