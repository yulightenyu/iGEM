parts:
  heading: "Our parts in the Registry"
  lead: "Every construct we build is documented as a reusable part, so the next team can stand on our work."
  intro: "The collection below covers the coding sequence, secretion and expression composites, and the screening tools we used. Part IDs are placeholders until registered."
  items:
    - {id: "BBa_K000001", name: "Brazzein (codon-optimised CDS)", type: "Coding", desc: "Mature 54-residue brazzein, codon-optimised for our yeast chassis."}
    - {id: "BBa_K000002", name: "α-factor signal + Brazzein", type: "Composite", desc: "Secretion construct: exports folded brazzein into the medium."}
    - {id: "BBa_K000003", name: "AOX1 promoter + Brazzein", type: "Composite", desc: "Methanol-inducible expression cassette for Pichia pastoris."}
    - {id: "BBa_K000004", name: "His-tagged Brazzein", type: "Coding", desc: "C-terminal His-tag variant for affinity purification."}
